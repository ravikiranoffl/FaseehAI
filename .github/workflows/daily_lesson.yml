name: Al-Mudarris Al-Arab

on:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 2:30 AM UTC (around 8:00 AM IST)
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  generate_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Mudaris Gemini Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mudaris.py

      - name: Commit and Push New Lesson
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lessons/*.txt
          git commit -m "Add daily lesson for $(date +'%Y%m%d')" || echo "No changes to commit"
          git push
